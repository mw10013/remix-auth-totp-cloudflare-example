# https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_date = "2023-12-01"

# https://developers.cloudflare.com/d1/learning/local-development/#develop-locally-with-pages
[[ d1_databases ]]
binding = "DB"
database_name = "ratce-db-dev"
database_id = "intentionally-dummy-id"
preview_database_id = "DB"
migrations_table = "d1_migrations"
migrations_dir = "drizzle"

[[ env.preview.d1_databases ]]
binding = "DB"
database_name = "ratce-db-preview"
database_id = "0eaa759e-4a3f-49aa-8a99-c77b44672119" # pnpm wrangler d1 info ratce-db-preview
preview_database_id = "DB"
migrations_table = "d1_migrations"
migrations_dir = "drizzle"

[[ env.prod.d1_databases ]]
binding = "DB"
database_name = "ratce-db-prod"
database_id = "1b7b69f2-f9ea-4384-9ed0-e6d9bda11c98" # pnpm wrangler d1 info ratce-db-prod
preview_database_id = "DB"
migrations_table = "d1_migrations"
migrations_dir = "drizzle"

